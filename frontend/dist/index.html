<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indian Stock Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; }
    .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
    .gradient-text { background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  </style>
</head>
<body class="min-h-screen">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <aside class="w-64 glass border-r border-slate-800 flex flex-col">
      <div class="p-6 border-b border-slate-800">
        <h1 class="font-bold text-lg gradient-text">Stock Tracker</h1>
        <p class="text-xs text-slate-400">Indian Markets</p>
      </div>
      <nav class="flex-1 p-4 space-y-1">
        <a href="#dashboard" class="block px-4 py-3 rounded-lg bg-blue-600/20 text-blue-400 border border-blue-500/30 font-medium">Dashboard</a>
        <a href="#watchlist" class="block px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 font-medium">Watchlist</a>
        <a href="#alerts" class="block px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 font-medium">Alerts</a>
        <a href="#reports" class="block px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 font-medium">Reports</a>
      </nav>
      <div class="p-4 border-t border-slate-800">
        <div class="glass rounded-lg p-4">
          <p class="text-xs text-red-400 font-semibold mb-1">⚠️ Risk Disclaimer</p>
          <p class="text-xs text-slate-500">For analysis only. Not financial advice.</p>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-6">
      <div id="content">
        <div class="text-center py-20">
          <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto mb-4"></div>
          <p class="text-slate-400">Loading dashboard data...</p>
        </div>
      </div>
    </main>
  </div>

  <script>
    const API_BASE = '/api';

    async function loadDashboard() {
      try {
        const res = await fetch(`${API_BASE}/dashboard/full`);
        const data = await res.json();
        renderDashboard(data);
      } catch (err) {
        document.getElementById('content').innerHTML = `
          <div class="text-center py-20 text-red-400">
            <p class="text-xl mb-2">⚠️ Connection Error</p>
            <p class="text-slate-400">Cannot connect to backend API at ${API_BASE}</p>
            <p class="text-sm text-slate-500 mt-2">Make sure the backend container is running on port 8000</p>
          </div>
        `;
      }
    }

    function renderDashboard(data) {
      const { stats, weekly_picks, recent_alerts, sentiment_overview } = data;

      let html = `
        <div class="space-y-6">
          <div class="flex items-center justify-between">
            <div>
              <h2 class="text-2xl font-bold gradient-text">Dashboard</h2>
              <p class="text-slate-400 text-sm mt-1">Real-time overview of your Indian stock portfolio</p>
            </div>
            <div class="flex gap-2">
              ${stats.critical_alerts > 0 ? `<span class="px-3 py-1.5 rounded-full bg-red-500/20 text-red-400 border border-red-500/30 text-xs font-medium">${stats.critical_alerts} Critical</span>` : ''}
              ${stats.unread_alerts > 0 ? `<span class="px-3 py-1.5 rounded-full bg-blue-500/20 text-blue-400 border border-blue-500/30 text-xs font-medium">${stats.unread_alerts} Unread</span>` : ''}
            </div>
          </div>

          <!-- Stats Cards -->
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            ${statCard('👁️', 'Watching', stats.watching_count, 'text-blue-400')}
            ${statCard('📦', 'Holding', stats.holding_count, 'text-green-400')}
            ${statCard('🚪', 'Exited', stats.exited_count, 'text-slate-400')}
            ${statCard('🔔', 'Alerts', stats.total_alerts, 'text-red-400')}
          </div>

          <!-- Weekly Picks -->
          <div class="glass rounded-xl p-6">
            <h3 class="text-lg font-semibold mb-4">📈 Weekly Top Picks</h3>
            ${weekly_picks.length === 0 ? '<p class="text-slate-500 text-center py-8">No picks available. Run weekly screening.</p>' : `
              <div class="space-y-3">
                ${weekly_picks.map((pick, i) => `
                  <div class="flex items-center justify-between p-4 bg-slate-800/50 rounded-lg">
                    <div class="flex items-center gap-4">
                      <div class="w-10 h-10 rounded-lg bg-slate-700 flex items-center justify-center font-bold text-sm">${i+1}</div>
                      <div>
                        <div class="flex items-center gap-2">
                          <span class="font-semibold">${pick.stock.symbol}</span>
                          <span class="text-xs text-slate-500">${pick.stock.name || ''}</span>
                        </div>
                        <span class="text-xs px-2 py-0.5 rounded font-medium ${pick.recommendation === 'BUY' ? 'bg-green-500/20 text-green-400' : pick.recommendation === 'WATCH' ? 'bg-yellow-500/20 text-yellow-400' : 'bg-slate-500/20 text-slate-400'}">${pick.recommendation}</span>
                      </div>
                    </div>
                    <div class="text-right">
                      <div class="text-2xl font-bold ${pick.stock.overall_score >= 70 ? 'text-green-400' : pick.stock.overall_score >= 50 ? 'text-yellow-400' : 'text-red-400'}">${Math.round(pick.stock.overall_score)}</div>
                      <div class="text-xs text-slate-500">Overall Score</div>
                    </div>
                  </div>
                `).join('')}
              </div>
            `}
          </div>

          <!-- Recent Alerts -->
          <div class="glass rounded-xl p-6">
            <h3 class="text-lg font-semibold mb-4">🔔 Recent Alerts</h3>
            ${recent_alerts.length === 0 ? '<p class="text-slate-500">No active alerts</p>' : `
              <div class="space-y-3">
                ${recent_alerts.slice(0, 5).map(alert => `
                  <div class="p-3 rounded-lg border ${alert.severity === 'critical' ? 'bg-red-500/10 border-red-500/20' : alert.severity === 'high' ? 'bg-orange-500/10 border-orange-500/20' : 'bg-slate-800/50 border-slate-700'}">
                    <div class="flex items-center gap-2 mb-1">
                      <span class="w-2 h-2 rounded-full ${alert.severity === 'critical' ? 'bg-red-400' : alert.severity === 'high' ? 'bg-orange-400' : 'bg-yellow-400'}"></span>
                      <span class="text-xs font-medium text-slate-300">${alert.stock_symbol}</span>
                    </div>
                    <p class="text-xs text-slate-400">${alert.title}</p>
                  </div>
                `).join('')}
              </div>
            `}
          </div>
        </div>
      `;

      document.getElementById('content').innerHTML = html;
    }

    function statCard(icon, label, value, color) {
      return `
        <div class="glass rounded-xl p-4">
          <div class="text-2xl mb-1">${icon}</div>
          <p class="text-2xl font-bold">${value}</p>
          <p class="text-xs text-slate-400">${label}</p>
        </div>
      `;
    }

    // Load dashboard on page load
    loadDashboard();
    // Refresh every 30 seconds
    setInterval(loadDashboard, 30000);
  </script>
</body>
</html>
