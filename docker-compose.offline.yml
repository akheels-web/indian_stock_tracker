services:
  postgres:
    image: postgres:16-alpine
    container_name: stock_tracker_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER:-stockuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stockpass}
      POSTGRES_DB: ${DB_NAME:-stocktracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - stock_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USER:-stockuser} -d $${DB_NAME:-stocktracker}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: stock_tracker_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - stock_net

  backend:
    image: python:3.11-slim
    container_name: stock_tracker_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-stockuser}
      DB_PASSWORD: ${DB_PASSWORD:-stockpass}
      DB_NAME: ${DB_NAME:-stocktracker}
      REDIS_URL: redis://redis:6379
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      ALPHA_VANTAGE_KEY: ${ALPHA_VANTAGE_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-me}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    volumes:
      - ./backend:/app
      - /app/__pycache__
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - stock_net
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&              python -c 'from database import init_db; init_db()' &&              uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    image: nginx:alpine
    container_name: stock_tracker_ui
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - stock_net

  scheduler:
    image: python:3.11-slim
    container_name: stock_tracker_scheduler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-stockuser}
      DB_PASSWORD: ${DB_PASSWORD:-stockpass}
      DB_NAME: ${DB_NAME:-stocktracker}
      REDIS_URL: redis://redis:6379
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      ALPHA_VANTAGE_KEY: ${ALPHA_VANTAGE_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      - ./backend:/app
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - stock_net
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&              python -c 'from database import init_db; init_db()' &&              python tasks/scheduler.py"

volumes:
  postgres_data:

networks:
  stock_net:
    driver: bridge
